<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RND Backup - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .header h1 span { color: #6366f1; }
        .header .user { display: flex; align-items: center; gap: 12px; }
        .header .user .email { font-size: 0.85rem; color: #94a3b8; }
        .header .user .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
        }
        .header .user .logout-btn {
            background: none; border: none;
            color: #94a3b8; cursor: pointer;
            font-size: 1rem; padding: 8px; border-radius: 8px;
            transition: all 0.3s;
        }
        .header .user .logout-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        /* STATS */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .num { font-size: 2rem; font-weight: 700; color: #6366f1; }
        .stat-card .num.success { color: #10b981; }
        .stat-card .num.danger { color: #ef4444; }
        .stat-card .num.warning { color: #f59e0b; }
        .stat-card .label { color: #94a3b8; font-size: 0.8rem; margin-top: 4px; }

        /* CARDS */
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .card-title i { color: #6366f1; }

        /* BUTTONS */
        .btn {
            padding: 12px 24px; border: none; border-radius: 10px;
            cursor: pointer; font-size: 0.9rem; font-weight: 600;
            transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-primary { background: #6366f1; color: white; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-warning:hover { background: #d97706; }
        .btn-outline { background: transparent; border: 1px solid #334155; color: #e2e8f0; }
        .btn-outline:hover { border-color: #6366f1; color: #6366f1; }
        .btn-sm { padding: 6px 14px; font-size: 0.75rem; }

        .flex { display: flex; gap: 12px; flex-wrap: wrap; }

        /* SEARCH */
        .search-box {
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .search-box input {
            flex: 1; min-width: 250px;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 0.9rem;
            outline: none;
        }
        .search-box input:focus { border-color: #6366f1; }

        /* ALERTS */
        .alert {
            padding: 16px 20px; border-radius: 12px; margin-bottom: 16px;
            display: flex; align-items: center; gap: 12px;
        }
        .alert-success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: #6ee7b7; }
        .alert-danger { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
        .alert-warning { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); color: #fcd34d; }

        /* PROGRESS */
        .progress-container { margin: 12px 0; }
        .progress-bar { height: 8px; background: #0f172a; border-radius: 4px; overflow: hidden; }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #6366f1, #818cf8);
            border-radius: 4px; transition: width 0.5s ease; width: 0%;
        }
        .progress-text { text-align: center; margin-top: 6px; color: #94a3b8; font-size: 0.85rem; }

        .hidden { display: none !important; }

        /* TOAST */
        .notification-toast {
            position: fixed; top: 24px; right: 24px;
            padding: 16px 24px; border-radius: 12px;
            color: white; font-weight: 600; z-index: 9999;
            transform: translateX(120%);
            transition: transform 0.4s ease;
            max-width: 420px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.5);
        }
        .notification-toast.show { transform: translateX(0); }
        .notification-toast.success { background: #10b981; }
        .notification-toast.error { background: #ef4444; }
        .notification-toast.warning { background: #f59e0b; }

        /* CONFIRM */
        .confirm-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 9998;
        }
        .confirm-overlay.active { display: flex; }
        .confirm-dialog {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 16px; padding: 32px; max-width: 450px; width: 90%;
        }
        .confirm-dialog .icon { font-size: 3rem; text-align: center; margin-bottom: 16px; }
        .confirm-dialog .icon.warning { color: #f59e0b; }
        .confirm-dialog .icon.danger { color: #ef4444; }
        .confirm-dialog h3 { text-align: center; margin-bottom: 8px; }
        .confirm-dialog p { color: #94a3b8; text-align: center; margin-bottom: 20px; }
        .confirm-dialog .btn-group { display: flex; gap: 12px; justify-content: center; }
        .confirm-dialog .btn-group .btn { min-width: 100px; justify-content: center; }

        /* SPINNER */
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid transparent; border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* EMPTY */
        .empty-state { text-align: center; padding: 40px; color: #94a3b8; }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }

        /* TABLE */
        .table-responsive { overflow-x: auto; border-radius: 12px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #0f172a; padding: 12px 16px; text-align: left; color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px 16px; border-top: 1px solid #334155; }
        .tag {
            display: inline-block; padding: 4px 14px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
        }
        .tag-success { background: rgba(16,185,129,0.15); color: #10b981; }
        .tag-danger { background: rgba(239,68,68,0.15); color: #ef4444; }
        .tag-warning { background: rgba(245,158,11,0.15); color: #f59e0b; }

        @media (max-width: 768px) {
            .stats { grid-template-columns: 1fr 1fr; }
            .flex { flex-direction: column; }
            .flex .btn { width: 100%; justify-content: center; }
            .search-box { flex-direction: column; }
            .search-box input { min-width: auto; }
        }
        @media (max-width: 480px) {
            .stats { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-dialog">
        <div class="icon" id="confirmIcon">⚠️</div>
        <h3 id="confirmTitle">Are you sure?</h3>
        <p id="confirmMessage">This action cannot be undone.</p>
        <div class="btn-group">
            <button class="btn btn-outline" onclick="closeConfirm()">Cancel</button>
            <button class="btn btn-danger" id="confirmBtn" onclick="executeConfirmed()">Confirm</button>
        </div>
    </div>
</div>

<!-- NOTIFICATION -->
<div class="notification-toast" id="notification"></div>

<!-- HEADER -->
<header class="header">
    <h1><i class="fas fa-shield-halved" style="color:#6366f1;"></i> RND <span>Backup</span></h1>
    <div class="user">
        <span class="email" id="adminEmail">admin@rnd.com</span>
        <div class="avatar" id="adminAvatar">A</div>
        <button class="logout-btn" onclick="adminLogout()" title="Logout">
            <i class="fas fa-sign-out-alt"></i>
        </button>
    </div>
</header>

<!-- MAIN -->
<div class="container">

    <!-- STATS -->
    <div class="stats">
        <div class="stat-card"><div class="num" id="mainUsers">0</div><div class="label">Main Users</div></div>
        <div class="stat-card"><div class="num success" id="backupUsers">0</div><div class="label">Backup Users</div></div>
        <div class="stat-card"><div class="num" id="statusCount">--</div><div class="label">Status</div></div>
        <div class="stat-card"><div class="num" id="lastBackupTime">--</div><div class="label">Last Backup</div></div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="card">
        <div class="card-title"><i class="fas fa-bolt"></i> Quick Actions</div>
        <div class="flex">
            <button class="btn btn-success" onclick="confirmBackup()">
                <i class="fas fa-rotate"></i> Backup All Data
            </button>
            <button class="btn btn-danger" onclick="confirmRestoreAll()">
                <i class="fas fa-database"></i> Restore Full Database
            </button>
            <button class="btn btn-primary" onclick="checkStatus()">
                <i class="fas fa-heart-pulse"></i> Check Status
            </button>
            <button class="btn btn-outline" onclick="clearLogs()">
                <i class="fas fa-times"></i> Clear Logs
            </button>
        </div>
        <div id="progressContainer" class="hidden" style="margin-top:12px;">
            <div class="progress-container">
                <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
                <div class="progress-text" id="progressText">Processing...</div>
            </div>
        </div>
    </div>

    <!-- RESTORE ONE USER -->
    <div class="card">
        <div class="card-title"><i class="fas fa-rotate-left"></i> Restore One User</div>
        <p style="color:#94a3b8;font-size:0.85rem;margin-bottom:12px;">Delete हुए User का UID डालें और Restore करें</p>
        <div class="search-box">
            <input type="text" id="restoreUid" placeholder="Enter UID to restore..." />
            <button class="btn btn-danger" onclick="confirmRestoreUser()">
                <i class="fas fa-rotate-left"></i> Restore User
            </button>
        </div>
        <div id="restoreResult"></div>
    </div>

    <!-- ACTIVITY LOG -->
    <div class="card">
        <div class="card-title"><i class="fas fa-clock-rotate-left"></i> Activity Log</div>
        <div id="activityLog">
            <div class="empty-state"><i class="fas fa-clock"></i><p>No activity yet</p></div>
        </div>
    </div>

</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<!-- ADMIN.JS -->
<script src="admin.js"></script>

</body>
</html>

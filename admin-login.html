<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RND Backup - Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 48px 40px;
            width: 420px;
            max-width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #10b981);
        }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header .icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 2rem;
            color: white;
        }
        .login-header h1 { color: #e2e8f0; font-size: 1.5rem; }
        .login-header h1 span { color: #6366f1; }
        .login-header p { color: #94a3b8; font-size: 0.9rem; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #94a3b8; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 10px; color: #e2e8f0;
            font-size: 0.95rem; outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .form-group input::placeholder { color: #64748b; }
        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none; border-radius: 10px;
            color: white; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-login .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #fca5a5;
            font-size: 0.9rem;
            display: none;
            margin-bottom: 16px;
        }
        .error-message.show { display: block; }
        .success-message {
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #6ee7b7;
            font-size: 0.9rem;
            display: none;
            margin-bottom: 16px;
        }
        .success-message.show { display: block; }
        .signup-link { text-align: center; margin-top: 16px; color: #94a3b8; font-size: 0.85rem; }
        .signup-link a { color: #6366f1; text-decoration: none; }
        .signup-link a:hover { text-decoration: underline; }
        .footer { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 0.75rem; }
        @media (max-width: 480px) {
            .login-container { padding: 32px 24px; }
        }
    </style>
</head>
<body>

<div class="login-container">

    <div class="login-header">
        <div class="icon"><i class="fas fa-shield-halved"></i></div>
        <h1>RND <span>Backup</span></h1>
        <p>Admin Login • Secure Access</p>
    </div>

    <div class="error-message" id="errorMessage">❌ Invalid credentials</div>
    <div class="success-message" id="successMessage">✅ Login successful! Redirecting...</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="adminEmail" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="adminPassword" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
    </form>

    <div class="signup-link">
        New Admin? <a href="signup.html">Sign Up</a>
    </div>

    <div class="footer">
        <i class="fas fa-shield-alt"></i> Secure Admin Access • Firebase Authentication
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// ==================== FIREBASE CONFIG ====================
const MAIN_CONFIG = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b"
};

const BACKUP_CONFIG = {
    databaseURL: "https://myapp-ee226-default-rtdb.asia-southeast1.firebasedatabase.app"
};

let mainApp, backupApp, mainDB, backupDB, auth;

function initFirebase() {
    try { mainApp = firebase.app('mainApp'); } catch(e) {
        mainApp = firebase.initializeApp(MAIN_CONFIG, 'mainApp');
    }
    try { backupApp = firebase.app('backupApp'); } catch(e) {
        backupApp = firebase.initializeApp(BACKUP_CONFIG, 'backupApp');
    }
    mainDB = firebase.database(mainApp);
    backupDB = firebase.database(backupApp);
    auth = firebase.auth(mainApp);
    console.log('✅ Firebase initialized');
}

// ==================== CHECK ADMIN ====================
async function checkAdmin(uid, email) {
    try {
        // Check in Backup Firebase
        const snap = await backupDB.ref('admins/' + uid).once('value');
        if (snap.exists()) {
            return true;
        }
        // Check in Main Firebase as fallback
        const mainSnap = await mainDB.ref('admins/' + uid).once('value');
        return mainSnap.exists();
    } catch(e) {
        console.error('Admin check error:', e);
        return false;
    }
}

// ==================== HANDLE LOGIN ====================
async function handleLogin(event) {
    event.preventDefault();

    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value.trim();
    const errorEl = document.getElementById('errorMessage');
    const successEl = document.getElementById('successMessage');
    const btn = document.getElementById('loginBtn');

    if (!email) {
        errorEl.textContent = '❌ Please enter your email address';
        errorEl.classList.add('show');
        return;
    }
    if (!password) {
        errorEl.textContent = '❌ Please enter your password';
        errorEl.classList.add('show');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Logging in...';
    errorEl.classList.remove('show');
    successEl.classList.remove('show');

    try {
        const result = await auth.signInWithEmailAndPassword(email, password);
        const user = result.user;

        // Verify admin
        const isAdmin = await checkAdmin(user.uid, email);
        if (!isAdmin) {
            await auth.signOut();
            errorEl.textContent = '⛔ Unauthorized: You are not an admin';
            errorEl.classList.add('show');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            return;
        }

        // Create session
        const adminSession = {
            uid: user.uid,
            email: user.email,
            isAdmin: true,
            loginTime: new Date().toISOString(),
            expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString()
        };
        localStorage.setItem('adminSession', JSON.stringify(adminSession));

        console.log('✅ Admin logged in:', email);
        successEl.classList.add('show');

        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1000);

    } catch(err) {
        console.error('Login error:', err);
        let msg = '❌ Login failed. Please try again.';
        if (err.code === 'auth/user-not-found') {
            msg = '❌ No account found. Please sign up first.';
        } else if (err.code === 'auth/wrong-password') {
            msg = '❌ Incorrect password. Please try again.';
        } else if (err.code === 'auth/too-many-requests') {
            msg = '❌ Too many failed attempts. Please try again later.';
        }
        errorEl.textContent = msg;
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }
}

// ==================== CHECK EXISTING SESSION ====================
function checkExistingSession() {
    const session = localStorage.getItem('adminSession');
    if (session) {
        try {
            const admin = JSON.parse(session);
            if (admin.expiresAt && new Date(admin.expiresAt) > new Date()) {
                window.location.href = 'index.html';
                return true;
            }
        } catch(e) {}
    }
    return false;
}

// ==================== INIT ====================
function init() {
    initFirebase();
    if (checkExistingSession()) return;
    document.getElementById('adminEmail').focus();
    console.log('✅ Login page ready');
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RND Backup - Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 48px 40px;
            width: 420px;
            max-width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #10b981);
        }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header .icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 2rem;
            color: white;
        }
        .login-header h1 { color: #e2e8f0; font-size: 1.5rem; }
        .login-header h1 span { color: #6366f1; }
        .login-header p { color: #94a3b8; font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .form-group input::placeholder { color: #64748b; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-login .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #fca5a5;
            font-size: 0.9rem;
            display: none;
            margin-bottom: 16px;
        }
        .error-message.show { display: block; }
        .success-message {
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #6ee7b7;
            font-size: 0.9rem;
            display: none;
            margin-bottom: 16px;
        }
        .success-message.show { display: block; }
        .login-footer { text-align: center; margin-top: 24px; color: #94a3b8; font-size: 0.75rem; }
        .demo-cred {
            background: rgba(99,102,241,0.05);
            border: 1px solid rgba(99,102,241,0.1);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .demo-cred p { color: #94a3b8; font-size: 0.8rem; margin-bottom: 4px; }
        .demo-cred .cred { color: #e2e8f0; font-family: monospace; font-size: 0.9rem; }
        .demo-cred .cred span { color: #10b981; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <div class="icon"><i class="fas fa-shield-halved"></i></div>
        <h1>RND <span>Backup</span></h1>
        <p>Admin Panel • Simple & Secure</p>
    </div>

    <div class="demo-cred">
        <p>📧 Your Admin Credentials</p>
        <div class="cred">Email: <span>rkv858810@gmail.com</span> &nbsp;|&nbsp; Password: <span>123@Randigital</span></div>
    </div>

    <div class="error-message" id="errorMessage">❌ Invalid credentials</div>
    <div class="success-message" id="successMessage">✅ Login successful! Redirecting...</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>📧 Email Address</label>
            <input type="email" id="adminEmail" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
            <label>🔒 Password</label>
            <input type="password" id="adminPassword" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
    </form>

    <div class="login-footer">Secure Admin Access • Firebase Authentication</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b"
};

const SUPER_ADMINS = ['rkv858810@gmail.com', 'admin@rnd.com'];

let app, auth, db;

function initFirebase() {
    try { app = firebase.initializeApp(FIREBASE_CONFIG); } catch(e) {}
    auth = firebase.auth(app);
    db = firebase.database(app);
}

async function checkAdmin(uid, email) {
    if (SUPER_ADMINS.includes(email)) return true;
    const snap = await db.ref('admins/' + uid).once('value');
    return snap.val() === true;
}

async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value.trim();
    const errorEl = document.getElementById('errorMessage');
    const successEl = document.getElementById('successMessage');
    const btn = document.getElementById('loginBtn');

    if (!email || !password) {
        errorEl.textContent = '❌ Please enter email and password';
        errorEl.classList.add('show');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Logging in...';
    errorEl.classList.remove('show');
    successEl.classList.remove('show');

    try {
        const result = await auth.signInWithEmailAndPassword(email, password);
        const user = result.user;

        const isAdmin = await checkAdmin(user.uid, email);
        if (!isAdmin) {
            await auth.signOut();
            errorEl.textContent = '⛔ Unauthorized: You are not an admin';
            errorEl.classList.add('show');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            return;
        }

        localStorage.setItem('adminSession', JSON.stringify({
            uid: user.uid,
            email: user.email,
            isAdmin: true,
            expiresAt: new Date(Date.now() + 24*60*60*1000).toISOString()
        }));

        successEl.classList.add('show');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);

    } catch(err) {
        let msg = '❌ Login failed. Please try again.';
        if (err.code === 'auth/user-not-found') msg = '❌ No account found with this email.';
        else if (err.code === 'auth/wrong-password') msg = '❌ Incorrect password.';
        else if (err.code === 'auth/invalid-email') msg = '❌ Invalid email address.';
        errorEl.textContent = msg;
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }
}

document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit'));
});

initFirebase();
</script>
</body>
</html>

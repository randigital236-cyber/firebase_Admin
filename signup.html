<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RND Backup - Admin Signup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .signup-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 48px 40px;
            width: 440px;
            max-width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .signup-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #10b981);
        }
        .signup-header { text-align: center; margin-bottom: 32px; }
        .signup-header .icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 2rem;
            color: white;
        }
        .signup-header h1 { color: #e2e8f0; font-size: 1.5rem; }
        .signup-header h1 span { color: #6366f1; }
        .signup-header p { color: #94a3b8; font-size: 0.9rem; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #94a3b8; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 10px; color: #e2e8f0;
            font-size: 0.95rem; outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .form-group input::placeholder { color: #64748b; }
        .btn-signup {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none; border-radius: 10px;
            color: white; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-signup:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
        .btn-signup:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-signup .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #fca5a5;
            font-size: 0.9rem;
            display: none;
            margin-bottom: 16px;
        }
        .error-message.show { display: block; }
        .success-message {
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #6ee7b7;
            font-size: 0.9rem;
            display: none;
            margin-bottom: 16px;
        }
        .success-message.show { display: block; }
        .login-link { text-align: center; margin-top: 16px; color: #94a3b8; font-size: 0.85rem; }
        .login-link a { color: #6366f1; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        .footer { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 0.75rem; }
        @media (max-width: 480px) {
            .signup-container { padding: 32px 24px; }
        }
    </style>
</head>
<body>

<div class="signup-container">

    <div class="signup-header">
        <div class="icon"><i class="fas fa-shield-halved"></i></div>
        <h1>RND <span>Backup</span></h1>
        <p>Admin Signup • One Time Only</p>
    </div>

    <div class="error-message" id="errorMessage">❌ Error</div>
    <div class="success-message" id="successMessage">✅ Signup successful! Redirecting to login...</div>

    <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" id="adminName" placeholder="Enter your full name" required />
        </div>
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="adminEmail" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="adminPassword" placeholder="Minimum 6 characters" required />
        </div>
        <button type="submit" class="btn-signup" id="signupBtn">
            <i class="fas fa-user-plus"></i> Create Admin Account
        </button>
    </form>

    <div class="login-link">
        Already have an account? <a href="login.html">Login</a>
    </div>

    <div class="footer">
        <i class="fas fa-shield-alt"></i> One Time Admin Setup • Secure
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// ==================== FIREBASE CONFIG ====================
const MAIN_CONFIG = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b"
};

const BACKUP_CONFIG = {
    databaseURL: "https://myapp-ee226-default-rtdb.asia-southeast1.firebasedatabase.app"
};

let mainApp, backupApp, mainDB, backupDB, auth;

function initFirebase() {
    try { mainApp = firebase.app('mainApp'); } catch(e) {
        mainApp = firebase.initializeApp(MAIN_CONFIG, 'mainApp');
    }
    try { backupApp = firebase.app('backupApp'); } catch(e) {
        backupApp = firebase.initializeApp(BACKUP_CONFIG, 'backupApp');
    }
    mainDB = firebase.database(mainApp);
    backupDB = firebase.database(backupApp);
    auth = firebase.auth(mainApp);
    console.log('✅ Firebase initialized');
}

// ==================== HANDLE SIGNUP ====================
async function handleSignup(event) {
    event.preventDefault();

    const name = document.getElementById('adminName').value.trim();
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value.trim();
    const errorEl = document.getElementById('errorMessage');
    const successEl = document.getElementById('successMessage');
    const btn = document.getElementById('signupBtn');

    if (!name) {
        errorEl.textContent = '❌ Please enter your full name';
        errorEl.classList.add('show');
        return;
    }
    if (!email) {
        errorEl.textContent = '❌ Please enter your email address';
        errorEl.classList.add('show');
        return;
    }
    if (!password || password.length < 6) {
        errorEl.textContent = '❌ Password must be at least 6 characters';
        errorEl.classList.add('show');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Creating account...';
    errorEl.classList.remove('show');
    successEl.classList.remove('show');

    try {
        // Step 1: Create user in Firebase Authentication
        const result = await auth.createUserWithEmailAndPassword(email, password);
        const user = result.user;

        // Step 2: Save admin info in Backup Firebase
        await backupDB.ref('admins/' + user.uid).set({
            name: name,
            email: email,
            role: 'admin',
            createdAt: new Date().toISOString()
        });

        // Step 3: Also save in Main Firebase for backup reference
        await mainDB.ref('admins/' + user.uid).set({
            name: name,
            email: email,
            role: 'admin',
            createdAt: new Date().toISOString()
        });

        console.log('✅ Admin created:', email);
        console.log('✅ UID:', user.uid);

        successEl.textContent = '✅ Admin account created successfully! Redirecting to login...';
        successEl.classList.add('show');

        // Auto logout and redirect
        await auth.signOut();

        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2000);

    } catch(err) {
        console.error('Signup error:', err);
        let msg = '❌ Signup failed. Please try again.';
        if (err.code === 'auth/email-already-in-use') {
            msg = '❌ This email is already registered. Please login.';
        } else if (err.code === 'auth/weak-password') {
            msg = '❌ Password is too weak. Use at least 6 characters.';
        } else if (err.code === 'auth/invalid-email') {
            msg = '❌ Invalid email address format.';
        }
        errorEl.textContent = msg;
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Admin Account';
    }
}

// ==================== CHECK IF ADMIN ALREADY EXISTS ====================
async function checkExistingAdmins() {
    try {
        const snap = await backupDB.ref('admins').once('value');
        const admins = snap.val() || {};
        if (Object.keys(admins).length > 0) {
            // Admin already exists, redirect to login
            console.log('✅ Admin already exists, redirecting to login');
            window.location.href = 'login.html';
        }
    } catch(e) {
        console.log('Check admins error:', e);
    }
}

// ==================== INIT ====================
function init() {
    initFirebase();
    // Check if any admin exists
    checkExistingAdmins();
    document.getElementById('adminName').focus();
    console.log('✅ Signup page ready');
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RND Backup - Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 48px 40px;
            width: 420px;
            max-width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #10b981);
        }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header .icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 2rem;
            color: white;
        }
        .login-header h1 { color: #e2e8f0; font-size: 1.5rem; }
        .login-header h1 span { color: #6366f1; }
        .login-header p { color: #94a3b8; font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #94a3b8; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 10px; color: #e2e8f0;
            font-size: 0.95rem; outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .form-group input::placeholder { color: #64748b; }
        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none; border-radius: 10px;
            color: white; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.3); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-login .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #fca5a5;
            font-size: 0.9rem;
            display: none;
            margin-bottom: 16px;
        }
        .error-message.show { display: block; }
        .success-message {
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: #6ee7b7;
            font-size: 0.9rem;
            display: none;
            margin-bottom: 16px;
        }
        .success-message.show { display: block; }
        .login-footer { text-align: center; margin-top: 24px; color: #94a3b8; font-size: 0.75rem; }
        .login-footer i { color: #10b981; }
        @media (max-width: 480px) {
            .login-container { padding: 32px 24px; }
        }
    </style>
</head>
<body>

<div class="login-container">

    <div class="login-header">
        <div class="icon"><i class="fas fa-shield-halved"></i></div>
        <h1>RND <span>Backup</span></h1>
        <p>Admin Panel • Secure Access</p>
    </div>

    <div class="error-message" id="errorMessage">❌ Invalid credentials</div>
    <div class="success-message" id="successMessage">✅ Login successful! Redirecting...</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="adminEmail" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="adminPassword" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
    </form>

    <div class="login-footer">
        <i class="fas fa-shield-alt"></i> Secure Admin Access • Firebase Authentication
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// ==================== FIREBASE CONFIG ====================
const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b"
};

let app, auth;

function initFirebase() {
    try {
        app = firebase.initializeApp(FIREBASE_CONFIG);
    } catch(e) {
        app = firebase.app();
    }
    auth = firebase.auth(app);
    console.log('✅ Firebase initialized');
}

// ==================== HANDLE LOGIN ====================
async function handleLogin(event) {
    event.preventDefault();

    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value.trim();
    const errorEl = document.getElementById('errorMessage');
    const successEl = document.getElementById('successMessage');
    const btn = document.getElementById('loginBtn');

    if (!email) {
        errorEl.textContent = '❌ Please enter your email address';
        errorEl.classList.add('show');
        return;
    }
    if (!password) {
        errorEl.textContent = '❌ Please enter your password';
        errorEl.classList.add('show');
        return;
    }
    if (password.length < 6) {
        errorEl.textContent = '❌ Password must be at least 6 characters';
        errorEl.classList.add('show');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Logging in...';
    errorEl.classList.remove('show');
    successEl.classList.remove('show');

    try {
        console.log('🔐 Attempting login for:', email);
        
        // ✅ STEP 1: Login
        const result = await auth.signInWithEmailAndPassword(email, password);
        const user = result.user;

        if (!user) throw new Error('Authentication failed');

        console.log('✅ Login successful:', email);
        console.log('✅ User UID:', user.uid);

        // ✅ STEP 2: Wait for auth state to be fully set
        // This ensures auth.currentUser is available in index.html
        
        // ✅ STEP 3: Create session
        const adminSession = {
            uid: user.uid,
            email: user.email,
            isAdmin: true,
            loginTime: new Date().toISOString(),
            expiresAt: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString()
        };

        localStorage.setItem('adminSession', JSON.stringify(adminSession));
        console.log('✅ Session saved to localStorage');

        // ✅ STEP 4: Show success
        successEl.classList.add('show');

        // ✅ STEP 5: Redirect after auth state is fully set
        // Wait for 1.5 seconds to ensure Firebase Auth state propagates
        setTimeout(() => {
            // ✅ Double check that user is still logged in
            if (auth.currentUser) {
                console.log('🔄 Auth state confirmed, redirecting to dashboard...');
                window.location.href = 'index.html';
            } else {
                console.log('⏳ Auth state not ready, waiting...');
                // Wait for auth state change
                const unsubscribe = auth.onAuthStateChanged((user) => {
                    if (user) {
                        unsubscribe();
                        console.log('🔄 Auth state ready, redirecting to dashboard...');
                        window.location.href = 'index.html';
                    }
                });
                // Timeout fallback
                setTimeout(() => {
                    unsubscribe();
                    console.log('🔄 Timeout fallback, redirecting to dashboard...');
                    window.location.href = 'index.html';
                }, 3000);
            }
        }, 1500);

    } catch(err) {
        console.error('❌ Login error:', err.code, err.message);

        let errorMsg = '❌ Login failed. Please try again.';
        if (err.code === 'auth/user-not-found') {
            errorMsg = '❌ No account found. Please create user in Firebase Console first.';
        } else if (err.code === 'auth/wrong-password') {
            errorMsg = '❌ Incorrect password. Please try again.';
        } else if (err.code === 'auth/invalid-email') {
            errorMsg = '❌ Invalid email address format.';
        } else if (err.code === 'auth/too-many-requests') {
            errorMsg = '❌ Too many failed attempts. Please try again later.';
        } else if (err.code === 'auth/network-request-failed') {
            errorMsg = '❌ Network error. Please check your internet connection.';
        }

        errorEl.textContent = errorMsg;
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }
}

// ==================== ENTER KEY SUPPORT ====================
document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const active = document.activeElement;
        if (active && (active.id === 'adminEmail' || active.id === 'adminPassword')) {
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
    }
});

// ==================== CHECK EXISTING SESSION ====================
function checkExistingSession() {
    const session = localStorage.getItem('adminSession');
    if (!session) return false;
    
    try {
        const admin = JSON.parse(session);
        if (admin.expiresAt && new Date(admin.expiresAt) > new Date()) {
            // ✅ Session exists, check if Firebase auth state is also active
            // If not, wait for it
            if (auth.currentUser) {
                console.log('✅ Existing session with active auth, redirecting to dashboard');
                window.location.href = 'index.html';
                return true;
            } else {
                console.log('⏳ Session exists but auth not ready, waiting...');
                const unsubscribe = auth.onAuthStateChanged((user) => {
                    if (user) {
                        unsubscribe();
                        console.log('✅ Auth ready, redirecting to dashboard');
                        window.location.href = 'index.html';
                    }
                });
                // Timeout fallback
                setTimeout(() => {
                    unsubscribe();
                    if (auth.currentUser) {
                        console.log('✅ Auth ready (timeout), redirecting to dashboard');
                        window.location.href = 'index.html';
                    }
                }, 3000);
                return true;
            }
        } else {
            localStorage.removeItem('adminSession');
        }
    } catch(e) {
        localStorage.removeItem('adminSession');
    }
    return false;
}

// ==================== INIT ====================
function init() {
    initFirebase();
    
    // Wait for auth state before checking session
    const unsubscribe = auth.onAuthStateChanged((user) => {
        unsubscribe();
        if (!checkExistingSession()) {
            document.getElementById('adminEmail').focus();
            console.log('✅ Login page ready');
            console.log('📧 Email: rkv858810@gmail.com');
            console.log('🔑 Password: 123@Randigital');
        }
    });
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
</body>
</html>
